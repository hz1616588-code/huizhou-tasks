<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>匯洲工單 - 客服</title>
  <link rel="manifest" href="manifest-cs.json">
  <meta name="theme-color" content="#1E2A47">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="common.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="topbar">
  <div class="topbar-title">
    <span class="logo-dot"></span>
    匯洲工單 · 客服
  </div>
  <div class="topbar-right">
    <button id="bellBtn" class="bell-btn" title="通知">
      🔔
      <span id="bellBadge" class="bell-badge hidden">0</span>
    </button>
    <div id="userChip" class="user-chip"></div>
  </div>
</header>

<div id="notifPanel" class="notif-panel">
  <div class="notif-panel-head">
    <span>通知 <span id="notifUnread">(0 未讀)</span></span>
    <button id="markAllReadBtn" class="btn btn-ghost btn-sm" style="color:white;border-color:rgba(255,255,255,0.3)">全部標為已讀</button>
  </div>
  <div id="notifList" class="notif-list"></div>
</div>

<div class="container">

  <!-- ① 新增工單 -->
  <section class="section">
    <h3 class="section-title">➕ 新增工單</h3>
    <form id="newTaskForm">
      <div class="form-grid">
        <div class="form-group">
          <label>類別 <span class="required">*</span></label>
          <select class="form-control" name="category" required>
            <option value="shipment">出貨</option>
            <option value="return">退換貨</option>
            <option value="inquiry">查詢</option>
            <option value="review">審核（會員入會）</option>
            <option value="other">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label>急件</label>
          <div class="checkbox-row">
            <input type="checkbox" id="urgentChk" name="urgent">
            <label for="urgentChk">🚨 標記為急件（倉管會優先處理）</label>
          </div>
        </div>
        <div class="form-group">
          <label>客戶編號或姓名</label>
          <input class="form-control" name="customer_name">
        </div>
        <div class="form-group">
          <label>訂單號</label>
          <input class="form-control" name="order_no">
        </div>
        <div class="form-group full">
          <label>工單內容 <span class="required">*</span></label>
          <textarea class="form-control" name="title" required rows="3" placeholder="例：王小姐換貨 — 客戶說鞋子尺寸不對，要換大半號（可寫多行）"></textarea>
        </div>
        <div class="form-group full">
          <label>照片（可選多張）</label>
          <input type="file" class="form-control" name="photos" id="photoInput" multiple accept="image/*">
        </div>
        <div class="full text-right">
          <button type="submit" id="submitBtn" class="btn btn-accent btn-lg">📤 送出工單</button>
        </div>
      </div>
    </form>
  </section>

  <!-- ② 處理中 -->
  <section class="section">
    <h3 class="section-title">📋 處理中 <span class="count" id="pendingCount">0</span></h3>
    <div id="pendingList"></div>
  </section>

  <!-- ③ 今日已完成 -->
  <section class="section">
    <h3 class="section-title">✅ 今日已完成 <span class="count" id="doneTodayCount">0</span></h3>
    <div id="doneTodayList"></div>
  </section>

  <!-- ④ 歷史查詢（收合） -->
  <section class="section collapsible collapsed" id="historySection">
    <h3 class="section-title">📅 歷史查詢（最近 3 個月）</h3>
    <div class="section-body">
      <div class="filter-row">
        <div class="form-group">
          <label>起日</label>
          <input type="date" id="filterFrom" class="form-control">
        </div>
        <div class="form-group">
          <label>迄日</label>
          <input type="date" id="filterTo" class="form-control">
        </div>
        <div class="form-group">
          <label>類別</label>
          <select id="filterCategory" class="form-control">
            <option value="">全部</option>
            <option value="shipment">出貨</option>
            <option value="return">退換貨</option>
            <option value="inquiry">查詢</option>
            <option value="review">審核（會員入會）</option>
            <option value="other">其他</option>
          </select>
        </div>
        <div class="form-group">
          <label>來源</label>
          <select id="filterSource" class="form-control">
            <option value="">全部</option>
            <option value="zhongli_cs">中壢客服</option>
            <option value="longtan_cs">龍潭客服</option>
            <option value="admin">管理員</option>
          </select>
        </div>
        <div class="form-group">
          <label>狀態</label>
          <select id="filterStatus" class="form-control">
            <option value="">全部</option>
            <option value="pending">處理中</option>
            <option value="done">已完成</option>
            <option value="cancelled">已作廢</option>
          </select>
        </div>
        <div class="form-group">
          <label>客戶</label>
          <input id="filterCustomer" class="form-control" placeholder="關鍵字">
        </div>
        <div class="form-group" style="flex:0">
          <label>&nbsp;</label>
          <button class="btn btn-primary" id="filterBtn">🔍 查詢</button>
        </div>
      </div>
      <div id="historyList"></div>
    </div>
  </section>

</div>

<script src="config.js"></script>
<script src="common.js"></script>
<script>
// ============ 初始化 ============
let allTasks = [];
let notifications = [];

(async function init() {
  try {
    // 1. 取得身份
    await getUserIdentity(['zhongli_cs', 'longtan_cs']);
    renderUserChip(document.getElementById('userChip'));
    requestDesktopPermission();

    // 2. 設定鈴鐺
    setupNotifPanelToggle(document.getElementById('bellBtn'), document.getElementById('notifPanel'));
    document.getElementById('markAllReadBtn').addEventListener('click', async () => {
      // 客服只在乎自己開的單被作廢，故 cancelled 只標記自己開的
      await markAllRead(['completed', 'cancelled', 'comment'], { onlyOwnCancelled: true });
      await refreshNotifications();
    });

    // 3. 設定表單
    document.getElementById('newTaskForm').addEventListener('submit', handleSubmitTask);

    // 4. 設定歷史查詢
    document.getElementById('historySection').querySelector('.section-title').addEventListener('click', (e) => {
      e.currentTarget.parentElement.classList.toggle('collapsed');
    });
    document.getElementById('filterBtn').addEventListener('click', loadHistory);

    // 5. 載入資料
    await refreshAll();

    // 6. Realtime
    subscribeRealtime();

    // 7. visibilitychange re-sync
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) refreshAll();
    });

  } catch (e) {
    console.error('初始化失敗:', e);
  }
})();

// ============ 載入資料 ============
async function refreshAll() {
  await Promise.all([refreshTaskList(), refreshNotifications()]);
}

async function refreshTaskList() {
  // 處理中 + 今日已完成
  const todayStart = new Date();
  todayStart.setHours(0, 0, 0, 0);

  const { data, error } = await supabase
    .from('tasks')
    .select('*')
    .or(`status.eq.pending,and(status.eq.done,completed_at.gte.${todayStart.toISOString()})`)
    .order('priority', { ascending: false })  // urgent first
    .order('created_at', { ascending: false });

  if (error) {
    console.error('載入工單失敗:', error);
    return;
  }
  allTasks = data || [];
  // 撈每張工單的留言數
  const counts = await fetchCommentCounts(allTasks.map(t => t.id));
  allTasks.forEach(t => { t._comment_count = counts.get(t.id) || 0; });
  renderPending();
  renderDoneToday();
}

function renderPending() {
  const list = document.getElementById('pendingList');
  const pending = allTasks.filter(t => t.status === 'pending')
    .sort((a, b) => {
      if (a.priority !== b.priority) return a.priority === 'urgent' ? -1 : 1;
      return new Date(b.created_at) - new Date(a.created_at);
    });
  document.getElementById('pendingCount').textContent = pending.length;
  if (pending.length === 0) {
    list.innerHTML = '<div class="empty">目前沒有處理中的工單</div>';
    return;
  }
  list.innerHTML = pending.map(renderTaskCard).join('');
  bindCardEvents(list);
}

function renderDoneToday() {
  const list = document.getElementById('doneTodayList');
  const done = allTasks.filter(t => t.status === 'done' && isToday(t.completed_at))
    .sort((a, b) => new Date(b.completed_at) - new Date(a.completed_at));
  document.getElementById('doneTodayCount').textContent = done.length;
  if (done.length === 0) {
    list.innerHTML = '<div class="empty">今天還沒有完成的工單</div>';
    return;
  }
  list.innerHTML = done.map(renderTaskCard).join('');
  bindCardEvents(list);
}

function renderTaskCard(t) {
  const isUrgent = t.priority === 'urgent';
  const canCancel = t.status === 'pending' && t.created_by_user_id === currentUser.id;
  const canComplete = canCurrentUserComplete(t);
  const sourceLabel = sourceBadgeHtml(t.source, t.created_by_name);

  let statusHtml = '';
  if (t.status === 'done') {
    statusHtml = `<span class="badge badge-done">✅ 已完成</span>`;
  } else if (t.status === 'cancelled') {
    statusHtml = `<span class="badge badge-cancelled">🚫 已作廢</span>`;
  }

  const photos = (t.photos || []).map(url => `<img src="${escapeHtml(url)}" alt="照片" data-url="${escapeHtml(url)}">`).join('');

  let completedHtml = '';
  if (t.status === 'done') {
    completedHtml = `
      <div class="task-meta" style="background:var(--success-bg);padding:8px;border-radius:6px">
        <strong>✅ 倉管：${escapeHtml(t.completed_by_name || '')}</strong>
        <span>${formatDateTime(t.completed_at)}</span>
        ${t.completion_note ? `<span>備註：${escapeHtml(t.completion_note)}</span>` : ''}
      </div>`;
  }
  let cancelledHtml = '';
  if (t.status === 'cancelled') {
    cancelledHtml = `
      <div class="task-meta" style="background:#F3F4F6;padding:8px;border-radius:6px">
        <strong>🚫 作廢者：${escapeHtml(t.cancelled_by_name || '')}</strong>
        <span>${formatDateTime(t.cancelled_at)}</span>
        ${t.cancellation_reason ? `<span>原因：${escapeHtml(t.cancellation_reason)}</span>` : ''}
      </div>`;
  }

  return `
    <div class="task-card ${CATEGORY_CLASS[t.category] || 'cat-other'} ${isUrgent && t.status === 'pending' ? 'urgent' : ''} ${t.status === 'cancelled' ? 'cancelled' : ''}" data-task-id="${t.id}">
      <div class="task-card-head">
        ${isUrgent ? '<span class="badge badge-urgent">🔴 急件</span>' : ''}
        ${categoryBadgeHtml(t.category)}
        <div class="task-title">${escapeHtml(t.title)}</div>
        ${statusHtml}
      </div>
      <div class="task-meta">
        ${sourceLabel}
        <span>📅 ${formatDateTime(t.created_at)}</span>
        ${t.customer_name ? `<span>👤 ${escapeHtml(t.customer_name)}</span>` : ''}
        ${t.order_no ? `<span>📦 訂單 #${escapeHtml(t.order_no)}</span>` : ''}
      </div>
      ${t.description ? `<div class="task-body">${escapeHtml(t.description)}</div>` : ''}
      ${photos ? `<div class="task-photos">${photos}</div>` : ''}
      ${completedHtml}
      ${cancelledHtml}
      ${(canCancel || canComplete) ? `
        <div class="task-actions">
          ${canComplete ? `
            <input type="text" class="form-control note-input" placeholder="完成備註（可選）" data-id="${t.id}">
            <button class="btn btn-success btn-sm complete-btn" data-id="${t.id}">✅ 完成</button>
          ` : ''}
          ${canCancel ? `
            <button class="btn btn-ghost btn-sm cancel-btn" data-id="${t.id}">🚫 作廢</button>
          ` : ''}
        </div>
      ` : ''}
      ${renderCommentsSection(t, t._comment_count || 0)}
    </div>
  `;
}

function bindCardEvents(container) {
  container.querySelectorAll('.task-photos img').forEach(img => {
    img.addEventListener('click', () => openLightbox(img.getAttribute('data-url')));
  });
  container.querySelectorAll('.cancel-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      cancelTask(btn.getAttribute('data-id'));
    });
  });
  container.querySelectorAll('.complete-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const id = btn.getAttribute('data-id');
      const noteInput = container.querySelector(`.note-input[data-id="${id}"]`);
      completeTask(id, noteInput ? noteInput.value.trim() : '');
    });
  });
  // 對話區
  container.querySelectorAll('.task-card').forEach(card => bindCommentsEvents(card));
}

async function completeTask(taskId, note) {
  const btn = document.querySelector(`.complete-btn[data-id="${taskId}"]`);
  if (btn) { btn.disabled = true; btn.textContent = '處理中...'; }

  const { data, error } = await supabase
    .from('tasks')
    .update({
      status: 'done',
      completed_at: new Date().toISOString(),
      completed_by_user_id: currentUser.id,
      completed_by_name: currentUser.name,
      completion_note: note || null
    })
    .eq('id', taskId)
    .eq('status', 'pending')
    .select();

  if (error) {
    alert('完成失敗：' + error.message);
    if (btn) { btn.disabled = false; btn.textContent = '✅ 完成'; }
    return;
  }
  if (!data || data.length === 0) {
    const { data: latest } = await supabase
      .from('tasks').select('status, completed_by_name, cancelled_by_name').eq('id', taskId).single();
    if (latest?.status === 'done') {
      alert(`此工單已被「${latest.completed_by_name || '其他人'}」完成`);
    } else if (latest?.status === 'cancelled') {
      alert(`此工單已被「${latest.cancelled_by_name || '其他人'}」作廢`);
    } else {
      alert('此工單狀態已變更，請重新整理');
    }
    await refreshAll();
    return;
  }
  await refreshAll();
  showToast({ type: 'success', title: '✅ 完成', message: data[0].title });
}

// ============ 新增工單 ============
// 流程：先產生 UUID → 上傳照片 → 全部成功才 INSERT 工單
// 這樣若照片失敗，根本不會建立工單，倉管不會收到沒照片的殘缺工單
async function handleSubmitTask(e) {
  e.preventDefault();
  const form = e.target;
  const submitBtn = document.getElementById('submitBtn');
  const fd = new FormData(form);

  const title = (fd.get('title') || '').toString().trim();
  if (!title) {
    alert('請輸入標題');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = '📤 處理中...';

  // 預先產生 task id（讓照片路徑能跟工單對應）
  const taskId = crypto.randomUUID();
  const files = document.getElementById('photoInput').files;
  let photoUrls = [];

  try {
    // 1. 先上傳照片（若有的話）— 失敗就 throw，不會建工單
    if (files.length > 0) {
      submitBtn.textContent = `📤 上傳照片中... (0/${files.length})`;
      photoUrls = await uploadPhotos(files, taskId);
    }

    // 2. 照片全部成功後才 INSERT 工單
    submitBtn.textContent = '📤 建立工單中...';
    const { error } = await supabase.from('tasks').insert({
      id: taskId,
      source: currentUser.location,
      created_by_user_id: currentUser.id,
      created_by_name: currentUser.name,
      category: fd.get('category'),
      customer_name: (fd.get('customer_name') || '').toString().trim() || null,
      order_no: (fd.get('order_no') || '').toString().trim() || null,
      title,
      description: (fd.get('description') || '').toString().trim() || null,
      priority: fd.get('urgent') ? 'urgent' : 'normal',
      photos: photoUrls
    });

    if (error) throw error;

    form.reset();
    document.getElementById('photoInput').value = '';
    await refreshAll();
    showToast({
      type: 'success',
      title: '✅ 工單已送出',
      message: title,
      meta: '倉管會收到通知'
    });
  } catch (err) {
    alert('送出失敗：' + err.message + '\n\n工單尚未建立，請重新送出。');
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '📤 送出工單';
  }
}

// ============ 作廢 ============
async function cancelTask(taskId) {
  const reason = prompt('請輸入作廢原因（可選，例：客服打錯資料）：') || null;
  if (reason === null && !confirm('確定要作廢此工單嗎？')) return;

  const { data, error } = await supabase
    .from('tasks')
    .update({
      status: 'cancelled',
      cancelled_at: new Date().toISOString(),
      cancelled_by_user_id: currentUser.id,
      cancelled_by_name: currentUser.name,
      cancellation_reason: reason
    })
    .eq('id', taskId)
    .eq('status', 'pending')
    .eq('created_by_user_id', currentUser.id)
    .select();

  if (error) {
    alert('作廢失敗：' + error.message);
    return;
  }
  if (!data || data.length === 0) {
    alert('作廢失敗：此工單可能已被倉管完成，或不是您開立的。');
    await refreshAll();
    return;
  }
  await refreshAll();
  showToast({ type: 'info', title: '🚫 工單已作廢', message: data[0].title });
}

// ============ 通知 ============
async function refreshNotifications() {
  const sevenDaysAgoIso = new Date(Date.now() - 7 * 86400000).toISOString();

  // 1. 完成 / 作廢 工單事件
  const { data: tasksData, error: tasksErr } = await supabase
    .from('tasks')
    .select('id, title, status, source, created_by_user_id, created_by_name, completed_at, completed_by_name, completion_note, cancelled_at, cancelled_by_name')
    .in('status', ['done', 'cancelled'])
    .or(`completed_at.gte.${sevenDaysAgoIso},cancelled_at.gte.${sevenDaysAgoIso}`);
  if (tasksErr) console.warn('載入通知（tasks）失敗:', tasksErr);

  const filteredTasks = (tasksData || []).filter(t => {
    if (t.status === 'done') return true;
    if (t.status === 'cancelled') return t.created_by_user_id === currentUser.id;
    return false;
  });

  // 2. 留言事件（非作廢工單、非自己留的）
  const { data: commentsData, error: cErr } = await supabase
    .from('task_comments')
    .select('id, task_id, user_id, user_name, user_location, content, photos, created_at, tasks(id, title, status, source, created_by_user_id, created_by_name)')
    .gte('created_at', sevenDaysAgoIso)
    .neq('user_id', currentUser.id);
  if (cErr) console.warn('載入通知（comments）失敗:', cErr);

  const filteredComments = (commentsData || []).filter(c => c.tasks && c.tasks.status !== 'cancelled');

  // 3. 撈已讀紀錄
  const allTaskIds = [...new Set([
    ...filteredTasks.map(t => t.id),
    ...filteredComments.map(c => c.task_id)
  ])];
  const readMap = new Map(); // key: task_id_eventType → read_at iso
  if (allTaskIds.length > 0) {
    const { data: reads } = await supabase
      .from('notification_reads')
      .select('task_id, event_type, read_at')
      .eq('user_id', currentUser.id)
      .in('task_id', allTaskIds);
    if (reads) reads.forEach(r => readMap.set(`${r.task_id}_${r.event_type}`, r.read_at));
  }

  // 4. 組合
  const items = [];
  for (const t of filteredTasks) {
    const eventType = t.status === 'done' ? 'completed' : 'cancelled';
    items.push({
      task_id: t.id,
      title: t.title,
      source: t.source,
      created_by_name: t.created_by_name,
      completed_by_name: t.completed_by_name,
      cancelled_by_name: t.cancelled_by_name,
      event_type: eventType,
      event_time: eventType === 'completed' ? t.completed_at : t.cancelled_at,
      is_read: !!readMap.get(`${t.id}_${eventType}`)
    });
  }
  for (const c of filteredComments) {
    const lastReadIso = readMap.get(`${c.task_id}_comment`);
    const is_read = !!(lastReadIso && new Date(lastReadIso) >= new Date(c.created_at));
    items.push({
      task_id: c.task_id,
      title: c.tasks.title,
      user_name: c.user_name,
      user_location: c.user_location,
      content: c.content,
      photos: c.photos,
      event_type: 'comment',
      event_time: c.created_at,
      is_read
    });
  }
  items.sort((a, b) => new Date(b.event_time) - new Date(a.event_time));
  notifications = items.slice(0, 80);
  renderNotifications();
}

function renderNotifications() {
  const list = document.getElementById('notifList');
  const unread = notifications.filter(n => !n.is_read).length;
  document.getElementById('notifUnread').textContent = `(${unread} 未讀)`;
  const badge = document.getElementById('bellBadge');
  badge.textContent = unread;
  badge.classList.toggle('hidden', unread === 0);

  if (notifications.length === 0) { list.innerHTML = ''; return; }

  list.innerHTML = notifications.map(n => {
    let title, sub;
    if (n.event_type === 'completed') {
      const sourceLabel = LOCATION_ICON[n.source] + LOCATION_LABEL[n.source];
      title = `✅ ${escapeHtml(n.title)} 已完成`;
      sub = `🟡 ${escapeHtml(n.completed_by_name || '')} · ${relativeTime(n.event_time)} · 原開立：${sourceLabel} ${escapeHtml(n.created_by_name)}`;
    } else if (n.event_type === 'cancelled') {
      title = `🚫 ${escapeHtml(n.title)} 已作廢`;
      sub = `${escapeHtml(n.cancelled_by_name || '')} · ${relativeTime(n.event_time)}`;
    } else if (n.event_type === 'comment') {
      const icon = LOCATION_ICON[n.user_location] || '👤';
      const summary = n.content || (n.photos && n.photos.length ? `📷 ${n.photos.length} 張照片` : '');
      title = `💬 ${icon} ${escapeHtml(n.user_name)} 留言`;
      sub = `${escapeHtml(summary).slice(0, 60)} · ${relativeTime(n.event_time)} · 工單：${escapeHtml(n.title)}`;
    }
    return `
      <div class="notif-item ${n.is_read ? 'read' : ''}" data-id="${n.task_id}" data-event="${n.event_type}">
        <span class="notif-dot"></span>
        <div class="notif-content">
          <div class="notif-title">${title}</div>
          <div class="notif-sub">${sub}</div>
        </div>
      </div>`;
  }).join('');

  list.querySelectorAll('.notif-item').forEach(el => {
    el.addEventListener('click', async () => {
      const taskId = el.getAttribute('data-id');
      const eventType = el.getAttribute('data-event');
      await markRead(taskId, eventType);
      await refreshNotifications();
      // 跳轉到對應工單；若是留言事件，自動展開對話區
      const card = document.querySelector(`[data-task-id="${taskId}"]`);
      if (card) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.style.transition = 'background 0.3s';
        card.style.background = 'rgba(201,169,97,0.2)';
        setTimeout(() => { card.style.background = ''; }, 1500);
        if (eventType === 'comment') {
          const body = card.querySelector('.comments-body');
          if (body && !body.classList.contains('open')) {
            card.querySelector('.comments-toggle')?.click();
          }
        }
      }
      document.getElementById('notifPanel').classList.remove('open');
    });
  });
}

// ============ Realtime ============
function subscribeRealtime() {
  supabase.channel('cs-channel-' + currentUser.id)
    .on('postgres_changes', {
      event: 'UPDATE',
      schema: 'public',
      table: 'tasks'
    }, async (payload) => {
      const t = payload.new;
      const old = payload.old;

      // status 變成 done → 收到完成通知（自己完成自己的不彈窗）
      if (t.status === 'done' && old.status !== 'done' && t.completed_by_user_id !== currentUser.id) {
        const sourceLabel = LOCATION_ICON[t.source] + LOCATION_LABEL[t.source];
        showToast({
          type: 'success',
          title: '✅ 工單已完成',
          message: `${t.title}（${t.completed_by_name}）`,
          meta: `原開立：${sourceLabel} ${t.created_by_name}`,
          taskId: t.id
        });
        playAlert(false);
        blinkTitle('🔔');
        desktopNotify('✅ 工單已完成', `${t.title}（${t.completed_by_name}）`);
      }
      // status 變成 cancelled → 只通知「自己開的單被別人作廢」（通常是 admin 作廢）
      // 自己作廢自己 / 別人開的單被作廢 都不通知
      if (t.status === 'cancelled' && old.status !== 'cancelled'
          && t.cancelled_by_user_id !== currentUser.id
          && t.created_by_user_id === currentUser.id) {
        showToast({
          type: 'normal',
          title: '🚫 你的工單已被作廢',
          message: t.title,
          meta: `作廢者：${t.cancelled_by_name}${t.cancellation_reason ? '｜原因：' + t.cancellation_reason : ''}`,
          taskId: t.id
        });
        playAlert(false);
        blinkTitle('🚫');
      }

      await refreshAll();
    })
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'tasks'
    }, async () => {
      // 別人開的單也要進處理中清單
      await refreshTaskList();
    })
    .on('postgres_changes', {
      event: 'INSERT',
      schema: 'public',
      table: 'task_comments'
    }, async (payload) => {
      const c = payload.new;
      handleIncomingComment(c);
      // 自己送的不通知
      if (c.user_id === currentUser.id) return;

      // 找對應的 task — 若還沒在 allTasks 撈一下
      let task = allTasks.find(t => t.id === c.task_id);
      if (!task) {
        const { data } = await supabase.from('tasks').select('*').eq('id', c.task_id).single();
        task = data;
      }
      if (!task || task.status === 'cancelled') return;

      // CS 收 toast 規則：所有非作廢工單的留言（共用內部通訊）
      const icon = LOCATION_ICON[c.user_location] || '👤';
      showToast({
        type: 'info',
        title: `💬 ${icon} ${c.user_name} 留言`,
        message: c.content || (c.photos?.length ? `📷 ${c.photos.length} 張照片` : ''),
        meta: `工單：${task.title}`,
        taskId: c.task_id
      });
      playAlert(false);
      blinkTitle('💬');
      desktopNotify(`💬 ${c.user_name} 留言`, c.content || `工單：${task.title}`);
      await refreshNotifications();
    })
    .subscribe();
}

// ============ 歷史查詢 ============
async function loadHistory() {
  const from = document.getElementById('filterFrom').value;
  const to = document.getElementById('filterTo').value;
  const cat = document.getElementById('filterCategory').value;
  const src = document.getElementById('filterSource').value;
  const st = document.getElementById('filterStatus').value;
  const cust = document.getElementById('filterCustomer').value.trim();

  let q = supabase.from('tasks').select('*')
    .gte('created_at', new Date(Date.now() - 90 * 86400000).toISOString())
    .order('created_at', { ascending: false })
    .limit(500);

  if (from) q = q.gte('created_at', new Date(from).toISOString());
  if (to) {
    const d = new Date(to); d.setHours(23, 59, 59, 999);
    q = q.lte('created_at', d.toISOString());
  }
  if (cat) q = q.eq('category', cat);
  if (src) q = q.eq('source', src);
  if (st) q = q.eq('status', st);
  if (cust) q = q.ilike('customer_name', `%${cust}%`);

  const { data, error } = await q;
  if (error) {
    alert('查詢失敗：' + error.message);
    return;
  }

  const list = document.getElementById('historyList');
  if (!data || data.length === 0) {
    list.innerHTML = '<div class="empty">沒有符合條件的工單</div>';
    return;
  }
  list.innerHTML = `<div class="text-muted mb-8">共 ${data.length} 筆</div>` + data.map(renderTaskCard).join('');
  bindCardEvents(list);
}
</script>
